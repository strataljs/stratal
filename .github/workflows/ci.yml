name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Build all packages
        run: yarn workspaces foreach -At run build

      - name: Verify core package contents
        run: cd packages/core && npm pack --dry-run

      - name: Verify testing package contents
        run: cd packages/testing && npm pack --dry-run

      - name: Verify framework package contents
        run: cd packages/framework && npm pack --dry-run

      - name: Verify seeders package contents
        run: cd packages/seeders && npm pack --dry-run

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-artifacts
          path: |
            packages/core/dist/
            packages/testing/dist/
            packages/framework/dist/
            packages/seeders/dist/
          retention-days: 1

  lint:
    name: Lint & Typecheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-artifacts
          path: packages

      - name: Generate framework schema and types
        run: yarn workspace @stratal/framework pretest

      - name: Lint
        run: yarn lint

      - name: Typecheck core
        run: yarn workspace stratal typecheck

      - name: Typecheck testing
        run: yarn workspace @stratal/testing typecheck

      - name: Typecheck framework
        run: yarn workspace @stratal/framework typecheck

      - name: Typecheck seeders
        run: yarn workspace @stratal/seeders typecheck

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratal_test
          POSTGRES_USER: stratal
          POSTGRES_PASSWORD: stratal_test
        ports:
          - 5438:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://stratal:stratal_test@localhost:5438/stratal_test
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-artifacts
          path: packages

      - name: Create framework .env for database
        run: echo "DATABASE_URL=$DATABASE_URL" > packages/framework/.env

      - name: Generate framework schema and types
        run: yarn workspace @stratal/framework pretest

      - name: Run core tests
        run: yarn workspace stratal test

      - name: Run framework tests
        run: yarn workspace @stratal/framework test
