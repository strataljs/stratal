name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build core
        run: yarn workspace stratal build

      - name: Build testing package
        run: yarn workspace @stratal/testing build

      - name: Build framework package
        run: yarn workspace @stratal/framework build

      - name: Lint
        run: yarn lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build core
        run: yarn workspace stratal build

      - name: Build testing package
        run: yarn workspace @stratal/testing build

      - name: Typecheck core
        run: yarn workspace stratal typecheck

      - name: Typecheck testing
        run: yarn workspace @stratal/testing typecheck

      - name: Typecheck framework
        run: yarn workspace @stratal/framework typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratal_test
          POSTGRES_USER: stratal
          POSTGRES_PASSWORD: stratal_test
        ports:
          - 5438:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://stratal:stratal_test@localhost:5438/stratal_test
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build core
        run: yarn workspace stratal build

      - name: Build testing package
        run: yarn workspace @stratal/testing build

      - name: Build framework package
        run: yarn workspace @stratal/framework build

      - name: Generate framework schema and types
        run: yarn workspace @stratal/framework pretest

      - name: Run core tests
        run: yarn workspace stratal test

      - name: Run framework tests
        run: yarn workspace @stratal/framework test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build core
        run: yarn workspace stratal build

      - name: Build testing package
        run: yarn workspace @stratal/testing build

      - name: Build framework package
        run: yarn workspace @stratal/framework build

      - name: Verify package contents
        run: cd packages/core && npm pack --dry-run

      - name: Verify testing package contents
        run: cd packages/testing && npm pack --dry-run

      - name: Verify framework package contents
        run: cd packages/framework && npm pack --dry-run
